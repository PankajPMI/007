<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utkarsh Lecture Dashboard</title>

<style>
:root{
--bg-dark:#0a0a0a;
--bg-darker:#111;
--yellow:#facc15;
--yellow-dark:#eab308;
--yellow-glow:rgba(250,204,21,.18);
--text:#f5f5f5;
--text-light:#d4d4d4;
--border:rgba(250,204,21,.14);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:var(--bg-dark);
color:var(--text);
min-height:100vh;
padding:50px 20px;

background-image:
radial-gradient(circle at 15% 50%,rgba(250,204,21,.06),transparent 25%),
radial-gradient(circle at 85% 30%,rgba(250,204,21,.04),transparent 35%);
}

h1{
text-align:center;
font-size:2.6rem;
font-weight:700;
margin-bottom:50px;

background:linear-gradient(90deg,#facc15,#fef08a,#facc15);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:24px;
max-width:1400px;
margin:auto;
}

.card{
background:rgba(20,20,20,.75);
border:1px solid var(--border);
border-radius:16px;
padding:24px;
backdrop-filter:blur(12px);

transition:.28s;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:3px;

background:linear-gradient(90deg,transparent,var(--yellow),transparent);
opacity:.5;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,.5),
0 0 30px var(--yellow-glow);

border-color:rgba(250,204,21,.35);
}

.title{
font-size:1.32rem;
font-weight:600;
margin-bottom:10px;
}

.desc{
font-size:.95rem;
color:var(--text-light);
line-height:1.5;
margin-bottom:14px;
}

.date{
font-size:.82rem;
color:#777;
margin-bottom:16px;
}

.tag{
font-size:.78rem;
font-weight:600;
padding:5px 12px;
border-radius:30px;
display:inline-block;
margin-bottom:12px;
}

.pdf{
background:rgba(250,204,21,.18);
color:#facc15;
}

.video{
background:rgba(239,68,68,.18);
color:#f87171;
}

.btn{
display:inline-block;
padding:10px 20px;

background:var(--yellow-dark);
color:#000;
font-weight:600;

border-radius:10px;
text-decoration:none;

transition:.22s;

box-shadow:0 4px 14px rgba(250,204,21,.25);
}

.btn:hover{
background:var(--yellow);
transform:translateY(-2px);

box-shadow:0 8px 24px rgba(250,204,21,.4);
}

/* loading shimmer */

.loading{
height:150px;
border-radius:16px;

background:linear-gradient(
90deg,
#1a1a1a 25%,
#2a2a2a 37%,
#1a1a1a 63%
);

background-size:400% 100%;
animation:shimmer 1.3s infinite;
}

@keyframes shimmer{
0%{background-position:100% 0}
100%{background-position:-100% 0}
}

.error{
text-align:center;
color:#f87171;
font-size:1rem;
}

@media(max-width:600px){

h1{font-size:2.1rem}

.grid{gap:18px}

.card{padding:20px}

}
</style>
</head>

<body>

<h1>📚 Utkarsh Lecture Dashboard</h1>

<div class="grid" id="grid">

<div class="loading"></div>
<div class="loading"></div>
<div class="loading"></div>

</div>

<script>

const grid=document.getElementById("grid")

fetch("links.txt")

.then(res=>res.text())

.then(data=>{

grid.innerHTML=""

let lines=data.split("\n")

let fragment=document.createDocumentFragment()

lines.forEach(line=>{

if(!line.trim()) return

let parts=line.split(/:(.+)/)

let info=parts[0]?.trim()||""
let link=parts[1]?.trim()||"#"

let segments=info.split("||")

let title=segments[0]?.trim()||"Lecture"
let desc=segments[1]?.trim()||""
let date=segments[2]?.trim()||""

let type=link.includes(".pdf")?"pdf":"video"

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="tag ${type}">${type.toUpperCase()}</div>

<div class="title">${title}</div>

<div class="desc">${desc}</div>

<div class="date">${date}</div>

<a class="btn" href="${link}" target="_blank">खोलें →</a>

`

fragment.appendChild(card)

})

grid.appendChild(fragment)

})

.catch(()=>{

grid.innerHTML=

`<div class="error">
⚠️ links.txt लोड नहीं हो पाया
</div>`

})

</script>

</body>
</html>
